<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CodaRom | Mobile ROM IDE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="brand">
            <h1>CodaRom <span>v0.4</span></h1>
        </div>
        <div class="actions">
            <input type="file" id="romUpload" accept=".gb,.gbc" style="display:none">
            <button class="primary-btn" onclick="document.getElementById('romUpload').click()">Load ROM</button>
            <button id="exportIps" class="primary-btn">Export IPS</button>
        </div>
    </header>

    <main>
        <div id="systemStatus" style="background:#330000; color:#ff4444; font-size:10px; padding:5px; display:none;">
            System Error: Emulator dependencies failed to load.
        </div>

        <div class="toolbar">
            <label for="bankSelect">Bank Explorer:</label>
            <select id="bankSelect">
                <option value="">Waiting for ROM...</option>
            </select>
        </div>

        <section id="editorContainer">
            <div class="tabs">
                <button class="tab-btn active" data-tab="emu">Emulator</button>
                <button class="tab-btn" data-tab="gfx">Graphics</button>
            </div>

            <div id="emuView" class="tab-content">
                <div class="emu-screen-container">
                    <canvas id="emuCanvas" width="160" height="144"></canvas>

                    <div id="touchControls">
                        <div class="dpad">
                            <button id="btn-up" class="ctrl">▲</button>
                            <div class="dpad-mid">
                                <button id="btn-left" class="ctrl">◀</button>
                                <button id="btn-right" class="ctrl">▶</button>
                            </div>
                            <button id="btn-down" class="ctrl">▼</button>
                        </div>
                        <div class="action-buttons">
                            <button id="btn-b" class="ctrl-round">B</button>
                            <button id="btn-a" class="ctrl-round">A</button>
                        </div>
                    </div>
                </div>
                <button id="runRom" class="run-btn">Boot Working Buffer</button>
            </div>

            <div id="gfxView" class="tab-content hidden">
                <div class="gfx-wrapper">
                    <canvas id="tileCanvas"></canvas>
                </div>
            </div>
        </section>
    </main>

    <script src="./lib/XAudioServer.js"></script>
    <script src="./lib/GameBoyCore.js"></script>
    <script src="./lib/GameBoyIO.js"></script>

    <script type="module">
        window.addEventListener('load', () => {
            if (typeof GameBoyCore === 'undefined') {
                document.getElementById('systemStatus').style.display = 'block';
                console.error("Path Error: Could not find lib/GameBoyCore.js");
            }
        });
    </script>

    <script src="./js/app.js" type="module"></script>
</body>
</html>
