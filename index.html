<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CodaRom v0.4 | Mobile IDE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="brand"><h1>CodaRom <span>v0.4</span></h1></div>
        <div class="actions">
            <input type="file" id="romUpload" accept=".gb,.gbc">
            <button id="exportIps" class="primary-btn">Export IPS</button>
        </div>
    </header>

    <main>
        <div class="toolbar">
            <label>Jump to Bank:</label>
            <select id="bankSelect"><option>Load ROM...</option></select>
        </div>

        <section id="editorContainer">
            <div class="tabs">
                <button class="tab-btn active" data-tab="emu">Emulator</button>
                <button class="tab-btn" data-tab="gfx">Graphics</button>
            </div>
            
            <div id="emuView" class="tab-content">
                <div class="emu-wrap">
                    <canvas id="emuCanvas"></canvas>
                    <div id="touchControls">
                        <div class="dpad">
                            <button id="btn-up" class="ctrl">▲</button>
                            <div class="dpad-mid">
                                <button id="btn-left" class="ctrl">◀</button>
                                <button id="btn-right" class="ctrl">▶</button>
                            </div>
                            <button id="btn-down" class="ctrl">▼</button>
                        </div>
                        <div class="actions-group">
                            <button id="btn-b" class="ctrl-round">B</button>
                            <button id="btn-a" class="ctrl-round">A</button>
                        </div>
                    </div>
                </div>
                <button id="runRom" class="run-btn">Boot Working Buffer</button>
            </div>

            <div id="gfxView" class="tab-content hidden">
                <canvas id="tileCanvas"></canvas>
            </div>
        </section>
    </main>

    <script src="lib/GameBoyCore.js"></script>
    <script src="lib/GameBoyIO.js"></script>
    <script src="js/app.js" type="module"></script>
</body>
</html>
