<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodaRom | Advanced ROM IDE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="brand">
            <h1>CodaRom <span>v0.2</span></h1>
        </div>
        <div class="actions">
            <input type="file" id="romUpload" accept=".gb,.gbc">
            <button id="exportIps" class="primary-btn">Export IPS</button>
        </div>
    </header>

    <main>
        <nav id="sidebar">
            <div class="sidebar-header">ROM Explorer</div>
            <ul id="bankList"></ul>
        </nav>

        <section id="editorContainer">
            <div class="tabs">
                <button class="tab-btn active" data-tab="emu">Live Emulator</button>
                <button class="tab-btn" data-tab="gfx">Graphics (VRAM)</button>
                <button class="tab-btn" data-tab="code">ASM Disassembly</button>
            </div>
            
            <div id="emuView" class="tab-content">
                <div class="emu-container">
                    <canvas id="emuCanvas"></canvas>
                    <div class="emu-controls">
                        <button id="runRom">Run Working ROM</button>
                        <p class="hint">Controls: Arrows, Z (A), X (B), Enter (Start), Shift (Select)</p>
                    </div>
                </div>
            </div>

            <div id="gfxView" class="tab-content hidden">
                <div class="view-wrapper">
                    <canvas id="tileCanvas"></canvas>
                    <div id="inspector">
                        <h3>Tile Inspector</h3>
                        <p>Address: <span id="inspectAddr">-</span></p>
                        <p>Value: <span id="inspectVal">-</span></p>
                        <div id="tilePreview"></div>
                    </div>
                </div>
            </div>

            <div id="codeView" class="tab-content hidden">
                <div id="asmOutput">Disassembly logic initializing...</div>
            </div>
        </section>
    </main>

    <script src="https://binjgb.github.io/binjgb/binjgb.js"></script>
    <script src="js/app.js" type="module"></script>
</body>
</html>
