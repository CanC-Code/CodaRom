<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CodaRom | ROM Review & IDE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>CodaRom <span>v0.1</span></h1>
        <input type="file" id="romUpload" accept=".gb,.gbc">
        <button id="exportIps">Generate IPS Patch</button>
    </header>

    <main>
        <nav id="sidebar">
            <h3>ROM Explorer</h3>
            <ul id="bankList">
                </ul>
        </nav>

        <section id="editorContainer">
            <div class="tabs">
                <button class="tab-btn active" data-tab="code">ASM Code</button>
                <button class="tab-btn" data-tab="gfx">Graphics (VRAM)</button>
                <button class="tab-btn" data-tab="hex">Hex Editor</button>
            </div>
            
            <div id="codeView" class="tab-content">
                <pre id="asmOutput">Upload a ROM to begin disassembly...</pre>
            </div>
            
            <div id="gfxView" class="tab-content hidden">
                <canvas id="tileCanvas"></canvas>
            </div>
        </section>
    </main>

    <script src="js/app.js" type="module"></script>
</body>
</html>
